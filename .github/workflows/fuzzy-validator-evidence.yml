name: Fuzzy Validator Evidence

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: fuzzy-validator-evidence-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evidence-suite:
    name: Evidence integration suite (manual/nightly)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium
          pip install -r tools/fuzzy-validator/python/requirements.txt

      - name: Start docker stack
        run: docker compose -f docker-compose.php8.yml up -d --build

      - name: Wait for ORK3 app
        run: |
          for attempt in $(seq 1 60); do
            if curl -sf -o /dev/null http://127.0.0.1:19080/orkui/; then
              echo "App ready after ${attempt} attempts"
              exit 0
            fi
            sleep 5
          done
          echo "ORK3 app did not become ready on port 19080" >&2
          exit 1

      - name: Deploy sandbox (best effort)
        continue-on-error: true
        run: bin/ork-db deploy-sandbox --yes

      - name: Run evidence suite
        env:
          ORK3_E2E_BASE_URL: http://127.0.0.1:19080/orkui/
          ORK3_E2E_USERNAME: ${{ secrets.ORK3_E2E_USERNAME }}
          ORK3_E2E_PASSWORD: ${{ secrets.ORK3_E2E_PASSWORD }}
        run: tools/fuzzy-validator/evidence/scripts/run-evidence-suite.sh

      - name: Upload evidence run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzzy-validator-evidence-${{ github.run_id }}
          path: |
            tools/fuzzy-validator/evidence/reports/run-*
          retention-days: 14
          if-no-files-found: ignore
